name: gh-pages

on:
  push:
    branches: [ "main" ]

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./docs/_site
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Generate javadoc
        run: mvn -B clean javadoc:javadoc --no-transfer-progress
      - name: Fix docs/_site permissions
        run: sudo chown -R $USER:$USER docs/_site
      - name: Integrate javadoc to site
        run: |
          cp -r target/reports/apidocs ./docs/_site/apidocs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs/_site

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
